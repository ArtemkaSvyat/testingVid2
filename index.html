<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D навигация по объекту | Интерактивное видео</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .viewer {
            position: relative;
            max-width: 1200px;
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6);
            background: #000;
            transition: all 0.2s;
        }

        .media-container {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #0a0a0a;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 18px 24px;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(12px);
            flex-wrap: wrap;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .nav-left, .nav-right {
            flex: 0 0 auto;
            min-width: 110px;
            text-align: center;
        }

        .center-buttons {
            flex: 1 1 auto;
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 10px 26px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s ease;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            white-space: nowrap;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }

        button:hover:not(:disabled) {
            background: #1e2a4a;
            transform: scale(1.02);
        }

        button:active:not(:disabled) {
            transform: scale(0.96);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .home-btn {
            background: #4a6a8a;
        }

        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.94);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: white;
            gap: 20px;
            font-weight: 500;
        }

        .spinner {
            width: 54px;
            height: 54px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #ffffff;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #load-percent {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        @media (max-width: 700px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
                padding: 16px;
            }
            .nav-left, .nav-right, .center-buttons {
                justify-content: center;
            }
            button {
                padding: 8px 18px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div id="preloader">
    <div class="spinner"></div>
    <div id="load-percent">0%</div>
    <div>Загрузка видео...</div>
</div>
<div class="viewer">
    <div class="media-container">
        <video id="mainVideo" preload="auto" playsinline webkit-playsinline muted></video>
    </div>
    <div class="controls" id="controlsPanel">
        <div class="nav-left" id="navLeft"></div>
        <div class="center-buttons" id="centerButtons"></div>
        <div class="nav-right" id="navRight"></div>
    </div>
</div>

<script>
(function() {
    const FPS = 30;
    const videoPath = "videos/all_flights.mp4";
    const START_FRAME = 295;

    let currentState = "genplan";
    let selectedQueue = null;
    let isPlaying = false;
    let activeTimeUpdateHandler = null;

    const video = document.getElementById('mainVideo');
    const navLeftDiv = document.getElementById('navLeft');
    const navRightDiv = document.getElementById('navRight');
    const centerDiv = document.getElementById('centerButtons');

    // ------------------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ -------------------
    function frameToTime(frame) {
        return frame / FPS;
    }

    function disableAllButtons(disabled) {
        document.querySelectorAll('.controls button').forEach(btn => btn.disabled = disabled);
    }

    // Остановка текущего воспроизведения и очистка обработчика
    function stopCurrentPlayback() {
        if (activeTimeUpdateHandler) {
            video.removeEventListener('timeupdate', activeTimeUpdateHandler);
            activeTimeUpdateHandler = null;
        }
        if (!video.paused) {
            video.pause().catch(e => console.warn("Pause ignored", e));
        }
    }

    // Ожидание готовности видео для точного таймкода (seek + readyState)
    function waitForVideoReady(targetTime) {
        return new Promise((resolve, reject) => {
            // Если уже достаточно данных и позиция близка к нужной
            if (video.readyState >= 2 && Math.abs(video.currentTime - targetTime) < 0.05) {
                resolve();
                return;
            }
            // Устанавливаем нужное время
            video.currentTime = targetTime;
            
            let timeoutId = setTimeout(() => {
                cleanup();
                reject(new Error("Timeout waiting for video ready"));
            }, 4000); // максимум 4 секунды на подготовку
            
            const onCanPlay = () => {
                if (video.readyState >= 2) {
                    cleanup();
                    resolve();
                }
            };
            
            const onSeeked = () => {
                if (video.readyState >= 2) {
                    cleanup();
                    resolve();
                } else {
                    // после seeked ждём canplay
                    video.addEventListener('canplay', onCanPlay, { once: true });
                }
            };
            
            const onError = () => {
                cleanup();
                reject(new Error("Video error while seeking"));
            };
            
            function cleanup() {
                clearTimeout(timeoutId);
                video.removeEventListener('seeked', onSeeked);
                video.removeEventListener('canplay', onCanPlay);
                video.removeEventListener('error', onError);
            }
            
            video.addEventListener('seeked', onSeeked, { once: true });
            video.addEventListener('error', onError, { once: true });
        });
    }

    // Надёжное воспроизведение с автоматической подготовкой
    async function safePlaySegment(startFrame, endFrame) {
        if (isPlaying) return false;
        stopCurrentPlayback();
        
        const startTime = frameToTime(startFrame);
        const endTime = frameToTime(endFrame);
        
        try {
            // 1. Ожидаем готовности видео в начальной позиции
            await waitForVideoReady(startTime);
            
            // 2. Запускаем воспроизведение
            await video.play();
            
            // 3. Создаём обработчик для отслеживания окончания сегмента
            return new Promise((resolve, reject) => {
                const onTimeUpdate = () => {
                    if (video.currentTime >= endTime) {
                        video.pause();
                        video.removeEventListener('timeupdate', onTimeUpdate);
                        if (activeTimeUpdateHandler === onTimeUpdate) activeTimeUpdateHandler = null;
                        // фиксируем точный конечный кадр
                        video.currentTime = endTime;
                        resolve();
                    }
                };
                activeTimeUpdateHandler = onTimeUpdate;
                video.addEventListener('timeupdate', onTimeUpdate);
                
                // защита от зависания (если видео не доходит до конца из-за бага)
                const safetyTimeout = setTimeout(() => {
                    if (activeTimeUpdateHandler === onTimeUpdate) {
                        video.removeEventListener('timeupdate', onTimeUpdate);
                        activeTimeUpdateHandler = null;
                        video.pause();
                        console.warn("Safety timeout: forcing segment end");
                        resolve();
                    }
                }, (endTime - startTime) * 1000 + 800);
                
                // отменяем таймаут при успешном завершении
                const origResolve = resolve;
                resolve = (val) => {
                    clearTimeout(safetyTimeout);
                    origResolve(val);
                };
            });
        } catch (err) {
            console.warn("safePlaySegment error:", err);
            // Если не удалось воспроизвести, всё равно выходим из режима блокировки
            return false;
        }
    }

    // Воспроизведение последовательности отрезков (для сложных переходов)
    async function playSegments(segmentsList, finalCallback) {
        if (isPlaying) return;
        stopCurrentPlayback();
        isPlaying = true;
        disableAllButtons(true);
        
        try {
            for (const seg of segmentsList) {
                await safePlaySegment(seg.start, seg.end);
            }
            // После всех сегментов
            const lastSegment = segmentsList[segmentsList.length - 1];
            if (lastSegment) {
                video.currentTime = frameToTime(lastSegment.end);
                video.pause();
                if (finalCallback) finalCallback(lastSegment.end);
                updateUIByFrame(lastSegment.end);
            } else if (finalCallback) {
                finalCallback(START_FRAME);
                updateUIByFrame(START_FRAME);
            }
        } catch (err) {
            console.error("Playback sequence failed", err);
        } finally {
            isPlaying = false;
            disableAllButtons(false);
            // убедимся, что видео остановлено
            video.pause();
        }
    }

    // Упрощённый вызов одного отрезка
    function playSegment(start, end, onCompleteFrameCallback) {
        playSegments([{ start, end }], (finalFrame) => {
            if (onCompleteFrameCallback) onCompleteFrameCallback(finalFrame);
        });
    }

    // ------------------- ОТРИСОВКА ИНТЕРФЕЙСА -------------------
    function clearInterface() {
        navLeftDiv.innerHTML = '';
        navRightDiv.innerHTML = '';
        centerDiv.innerHTML = '';
    }

    function renderNavButtons(currentFrame) {
        // Таблица навигации: для каждого ключевого кадра определяем переходы влево/вправо
        const navRules = {
            295:  { left: [896, 935], right: [295, 344] },
            820:  { left: [896, 935], right: [295, 344] },
            1225: { left: [896, 935], right: [295, 344] },
            1540: { left: [896, 935], right: [295, 344] },
            1875: { left: [896, 935], right: [295, 344] },
            2128: { left: [896, 935], right: [295, 344] },
            344:  { left: [1183, 1225], right: [465, 509] },
            1135: { left: [1183, 1225], right: [465, 509] },
            509:  { left: [1090, 1135], right: [645, 690] },
            1035: { left: [1090, 1135], right: [645, 690] },
            690:  { left: [993, 1035], right: [780, 820] },
            935:  { left: [993, 1035], right: [780, 820] }
        };
        
        const rule = navRules[currentFrame];
        if (rule) {
            if (rule.left) {
                const leftBtn = document.createElement('button');
                leftBtn.textContent = "← Влево";
                leftBtn.onclick = () => {
                    if (!isPlaying) {
                        playSegment(rule.left[0], rule.left[1]);
                    }
                };
                navLeftDiv.appendChild(leftBtn);
            }
            if (rule.right) {
                const rightBtn = document.createElement('button');
                rightBtn.textContent = "Вправо →";
                rightBtn.onclick = () => {
                    if (!isPlaying) {
                        playSegment(rule.right[0], rule.right[1]);
                    }
                };
                navRightDiv.appendChild(rightBtn);
            }
        }
    }

    // Кнопка "На главную" с умными переходами
    function addHomeButton(currentFrame) {
        const genplanQueueFrames = [295, 820, 1225, 1540, 1875, 2128];
        if (genplanQueueFrames.includes(currentFrame)) return;
        
        let segmentsToPlay = null;
        // Определяем последовательность для возврата на стартовый кадр (295)
        if (currentFrame === 344 || currentFrame === 1135) {
            segmentsToPlay = [{ start: 1183, end: 1225 }];
        } else if (currentFrame === 509 || currentFrame === 1035) {
            segmentsToPlay = [
                { start: 645, end: 690 },
                { start: 780, end: 820 }
            ];
        } else if (currentFrame === 690 || currentFrame === 935) {
            segmentsToPlay = [{ start: 780, end: 820 }];
        }
        
        const homeBtn = document.createElement('button');
        homeBtn.textContent = "🏠 На главную";
        homeBtn.className = "home-btn";
        
        if (segmentsToPlay) {
            homeBtn.onclick = () => {
                if (!isPlaying) {
                    playSegments(segmentsToPlay, () => {
                        // после завершения анимации — перемещаемся на стартовый кадр
                        video.currentTime = frameToTime(START_FRAME);
                        video.pause();
                        updateUIByFrame(START_FRAME);
                    });
                }
            };
        } else {
            homeBtn.onclick = () => {
                if (!isPlaying) {
                    video.currentTime = frameToTime(START_FRAME);
                    video.pause();
                    updateUIByFrame(START_FRAME);
                }
            };
        }
        centerDiv.appendChild(homeBtn);
    }

    function renderGenplanQueueButtons() {
        [1, 2, 3].forEach(id => {
            const btn = document.createElement('button');
            btn.textContent = `Очередь ${id}`;
            btn.onclick = () => {
                if (isPlaying) return;
                let start, end;
                if (id === 1) { start = 1370; end = 1405; }
                else if (id === 2) { start = 1684; end = 1718; }
                else { start = 1983; end = 2013; }
                playSegment(start, end, () => {
                    selectedQueue = id;
                    currentState = "yard";
                    // принудительно обновляем UI по финальному кадру (этот вызов уже есть в playSegment)
                });
            };
            centerDiv.appendChild(btn);
        });
    }

    function renderYardButtons(currentQueue) {
        const others = [];
        if (currentQueue !== 1) others.push(1);
        if (currentQueue !== 2) others.push(2);
        if (currentQueue !== 3) others.push(3);
        
        others.forEach(target => {
            const btn = document.createElement('button');
            btn.textContent = `→ Очередь ${target}`;
            btn.onclick = () => {
                if (isPlaying) return;
                let start, end;
                if (currentQueue === 1 && target === 2) { start = 2330; end = 2360; }
                else if (currentQueue === 1 && target === 3) { start = 2784; end = 2820; }
                else if (currentQueue === 2 && target === 1) { start = 3018; end = 3060; }
                else if (currentQueue === 2 && target === 3) { start = 2452; end = 2484; }
                else if (currentQueue === 3 && target === 1) { start = 2637; end = 2676; }
                else if (currentQueue === 3 && target === 2) { start = 2900; end = 2942; }
                else return;
                playSegment(start, end, () => { 
                    selectedQueue = target;
                    updateUIByFrame(end); 
                });
            };
            centerDiv.appendChild(btn);
        });
        
        const backBtn = document.createElement('button');
        backBtn.textContent = "Генплан";
        backBtn.style.background = "#4a6a8a";
        backBtn.onclick = () => {
            if (isPlaying) return;
            let start, end;
            if (selectedQueue === 1) { start = 1507; end = 1540; }
            else if (selectedQueue === 2) { start = 1845; end = 1875; }
            else { start = 2091; end = 2128; }
            playSegment(start, end, () => {
                currentState = "genplan";
                selectedQueue = null;
                updateUIByFrame(end);
            });
        };
        centerDiv.appendChild(backBtn);
    }

    // Основной рендер UI на основе текущего кадра
    function updateUIByFrame(currentFrame) {
        clearInterface();
        console.log("UI обновлён, кадр:", currentFrame);
        
        const genplanQueueFrames = [295, 820, 1225, 1540, 1875, 2128];
        const yardMap = {
            1405: 1, 2676: 1, 3060: 1,
            1718: 2, 2360: 2, 2942: 2,
            2013: 3, 2484: 3, 2820: 3
        };
        
        if (yardMap.hasOwnProperty(currentFrame)) {
            currentState = "yard";
            selectedQueue = yardMap[currentFrame];
        } else {
            // если кадр не из yard-финалов — глобальный план (генплан)
            currentState = "genplan";
            selectedQueue = null;
        }
        
        renderNavButtons(currentFrame);
        
        if (currentState === "genplan") {
            if (genplanQueueFrames.includes(currentFrame)) {
                renderGenplanQueueButtons();
            }
            // Добавляем кнопку "На главную", если это не стартовый и не экран очередей генплана
            if (!genplanQueueFrames.includes(currentFrame) && currentFrame !== START_FRAME) {
                addHomeButton(currentFrame);
            }
        } else if (currentState === "yard") {
            renderYardButtons(selectedQueue);
        }
    }

    // ------------------- ЗАГРУЗКА ВИДЕО И СТАРТ -------------------
    const preloader = document.getElementById('preloader');
    const loadPercent = document.getElementById('load-percent');
    
    // Функция для инициализации приложения после готовности видео
    function initializeViewer() {
        video.currentTime = frameToTime(START_FRAME);
        video.pause();
        // небольшая задержка для стабилизации позиции и отрисовки UI
        setTimeout(() => {
            updateUIByFrame(START_FRAME);
        }, 80);
    }
    
    function startWithProgress() {
        let lastPercent = 0;
        let bufferedInterval;
        
        const checkBuffering = () => {
            if (video.buffered.length > 0) {
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                const duration = video.duration;
                if (duration && isFinite(duration)) {
                    let percent = Math.min(100, Math.floor((bufferedEnd / duration) * 100));
                    percent = Math.max(0, percent);
                    if (percent !== lastPercent) {
                        lastPercent = percent;
                        loadPercent.textContent = percent + '%';
                    }
                    if (percent >= 100 || (bufferedEnd >= frameToTime(START_FRAME) + 5.0)) {
                        // достаточно данных для старта
                        clearInterval(bufferedInterval);
                        preloader.style.display = 'none';
                        initializeViewer();
                    }
                } else {
                    loadPercent.textContent = '0%';
                }
            } else {
                loadPercent.textContent = '0%';
            }
        };
        
        // запускаем периодическую проверку буфера
        bufferedInterval = setInterval(checkBuffering, 200);
        
        // таймаут на случай, если видео не отдаёт прогресс (fallback через 12 секунд)
        setTimeout(() => {
            if (preloader.style.display !== 'none') {
                console.warn("Fallback: принудительный запуск через таймаут");
                clearInterval(bufferedInterval);
                preloader.style.display = 'none';
                initializeViewer();
            }
        }, 12000);
        
        // также ждём событие loadedmetadata, чтобы duration было доступно
        if (video.readyState === 0) {
            video.addEventListener('loadedmetadata', () => {
                checkBuffering();
            }, { once: true });
        } else {
            checkBuffering();
        }
    }
    
    // Настройка источника и запуск загрузки
    video.src = videoPath;
    video.load();
    video.muted = true;   // политика автоплея требует muted, но мы используем жесты кнопок
    
    video.addEventListener('error', (e) => {
        console.error("Видео ошибка:", e);
        preloader.style.display = 'none';
        alert(`Ошибка загрузки видео. Проверьте путь: ${videoPath}\n${video.error ? video.error.message : 'неизвестная ошибка'}`);
    });
    
    video.addEventListener('loadeddata', () => {
        // как только появились первые данные — запускаем мониторинг буфера
        startWithProgress();
    });
    
    // дополнительная защита: если loadeddata уже произошло до добавления слушателя
    if (video.readyState >= 2) {
        startWithProgress();
    }
})();
</script>
</body>
</html>
