<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D облёт здания</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .viewer {
            position: relative;
            max-width: 1200px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            background: #000;
        }
        .media-container {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        .media-container img,
        .media-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.2s ease;
        }
        /* Изначально видео невидимо, но присутствует в DOM */
        .media-container video {
            z-index: 2;
            opacity: 0;
        }
        .media-container img {
            z-index: 1;
            opacity: 1;
        }
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        button:hover {
            background: #1e2a4a;
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Прелоадер */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: white;
            font-family: system-ui, sans-serif;
            gap: 16px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #load-percent {
            font-size: 24px;
            font-weight: bold;
        }
        #load-text {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div id="preloader">
    <div class="spinner"></div>
    <div id="load-percent">0%</div>
    <div id="load-text">Загрузка ресурсов...</div>
</div>

<div class="viewer">
    <div class="media-container">
        <!-- Статичное изображение по умолчанию -->
        <img id="staticImage" src="renders/front_view.png" alt="Здание, вид спереди">
        <!-- Видео для анимаций -->
        <video id="transitionVideo" src="" preload="auto" playsinline webkit-playsinline muted></video>
    </div>
    <div class="controls">
        <!-- ВНИМАНИЕ: замени пути на свои реальные файлы! -->
        <button data-video="videos/fly_left_to_right.mp4" data-final-image="renders/right_view.png">Облёт → направо</button>
        <button data-video="videos/fly_left_to_right.mp4" data-final-image="renders/right_view.png">Облёт → налево</button>
        <button data-video="videos/fly_left_to_right.mp4" data-final-image="renders/right_view.png">Приблизить фасад</button>
    </div>
</div>

<script>
    (function() {
        // ======================= НАСТРОЙКА РЕСУРСОВ ДЛЯ ПРЕДЗАГРУЗКИ =======================
        // ⚠️ Укажи здесь ВСЕ файлы, которые используются на сайте:
        // - все статичные картинки (включая те, что в data-final-image у кнопок)
        // - все видео (из data-video у кнопок)
        const assetsToPreload = [
            // Статичные картинки (рендеры)
            "renders/front_view.png",
            "renders/right_view.png",
            // Видеофайлы
            "videos/fly_left_to_right.mp4"
        ];
        // ====================================================================

        const preloader = document.getElementById('preloader');
        const loadPercent = document.getElementById('load-percent');
        const staticImg = document.getElementById('staticImage');
        const videoElem = document.getElementById('transitionVideo');
        
        let loaded = 0;
        const total = assetsToPreload.length;

        function updateProgress() {
            const percent = Math.floor((loaded / total) * 100);
            loadPercent.textContent = percent + '%';
            if (loaded === total) {
                // Все ресурсы загружены — убираем прелоадер
                preloader.style.display = 'none';
                // Разблокируем кнопки
                document.querySelectorAll('button').forEach(btn => {
                    btn.disabled = false;
                });
            }
        }

        // Предзагрузка изображения
        function preloadImage(src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    loaded++;
                    updateProgress();
                    resolve();
                };
                img.onerror = () => {
                    console.warn(`Не удалось загрузить изображение: ${src}`);
                    loaded++;
                    updateProgress();
                    resolve();
                };
                img.src = src;
            });
        }

        // Предзагрузка видео (через создание скрытого video элемента)
        function preloadVideo(src) {
            return new Promise((resolve) => {
                const video = document.createElement('video');
                video.preload = 'auto';
                video.muted = true;
                video.playsInline = true;
                // Событие "canplaythrough" означает, что браузер загрузил достаточно данных для плавного воспроизведения
                video.oncanplaythrough = () => {
                    loaded++;
                    updateProgress();
                    resolve();
                };
                video.onerror = () => {
                    console.warn(`Не удалось загрузить видео: ${src}`);
                    loaded++;
                    updateProgress();
                    resolve();
                };
                video.src = src;
                video.load();
            });
        }

        // Запуск предзагрузки всех ресурсов
        async function startPreload() {
            // Блокируем кнопки с самого начала
            document.querySelectorAll('button').forEach(btn => {
                btn.disabled = true;
            });
            
            const promises = assetsToPreload.map(asset => {
                if (asset.match(/\.(jpg|jpeg|png|gif|webp)$/i)) {
                    return preloadImage(asset);
                } else if (asset.match(/\.(mp4|webm|mov)$/i)) {
                    return preloadVideo(asset);
                } else {
                    // Неизвестный тип — просто считаем загруженным
                    loaded++;
                    updateProgress();
                    return Promise.resolve();
                }
            });
            await Promise.all(promises);
        }

        // Функция воспроизведения перелёта (без display:none, только opacity + z-index)
        // Функция для запуска перелёта (улучшенная)
function playTransition(videoSrc, finalImageSrc) {
    // Останавливаем предыдущее воспроизведение, если оно было
    videoElem.pause();
    
    // Ставим видео на начальную позицию (на случай, если оно было доиграно)
    videoElem.currentTime = 0;
    
    // Делаем видео видимым, но картинка пока остаётся сверху
    videoElem.style.opacity = '1';
    videoElem.style.zIndex = '2';
    staticImg.style.zIndex = '1';
    staticImg.style.opacity = '1'; // картинка пока видна
    
    // Устанавливаем источник и загружаем
    videoElem.src = videoSrc;
    videoElem.load();
    
    // Убеждаемся, что настройки для iOS соблюдены
    videoElem.muted = true;
    videoElem.playsInline = true;
    videoElem.webkitPlaysInline = true;
    
    // Функция, которая сработает, когда видео отрисовало первый кадр
    const onFirstFrame = () => {
        // Теперь можно безопасно скрыть картинку
        staticImg.style.opacity = '0';
        // Убираем обработчики, чтобы не сработали повторно
        videoElem.removeEventListener('playing', onFirstFrame);
        videoElem.removeEventListener('timeupdate', onFirstFrame);
    };
    
    // Событие 'playing' срабатывает, когда видео начинает воспроизведение (первый кадр уже есть)
    videoElem.addEventListener('playing', onFirstFrame);
    // Подстраховка: если 'playing' не сработает, используем 'timeupdate' (первый тик)
    videoElem.addEventListener('timeupdate', onFirstFrame, { once: true });
    
    // Обработчик для ранней подмены картинки в конце
    let endedHandlerApplied = false;
    const onTimeUpdate = () => {
        const timeLeft = videoElem.duration - videoElem.currentTime;
        // Если до конца осталось менее 0.1 секунды и ещё не подменяли картинку
        if (timeLeft < 0.1 && !endedHandlerApplied) {
            endedHandlerApplied = true;
            // Меняем картинку на финальный рендер
            staticImg.src = finalImageSrc;
            // Оставляем картинку невидимой, но уже с новым src
            // Когда видео закончится, сделаем её видимой
        }
    };
    
    // Обработчик окончания видео
    const onEnded = () => {
        // Делаем картинку видимой (она уже содержит финальный кадр)
        staticImg.style.opacity = '1';
        // Прячем видео
        videoElem.style.opacity = '0';
        videoElem.style.zIndex = '1';
        // Чистим обработчики
        videoElem.removeEventListener('timeupdate', onTimeUpdate);
        videoElem.removeEventListener('ended', onEnded);
    };
    
    videoElem.addEventListener('timeupdate', onTimeUpdate);
    videoElem.addEventListener('ended', onEnded);
    
    // Запускаем воспроизведение
    const playPromise = videoElem.play();
    if (playPromise !== undefined) {
        playPromise.catch(error => {
            console.warn('Автовоспроизведение заблокировано:', error);
            // Если блокировка — откатываем изменения
            staticImg.style.opacity = '1';
            videoElem.style.opacity = '0';
        });
    }
}
        // Навешиваем обработчики на кнопки после загрузки DOM
        document.addEventListener('DOMContentLoaded', () => {
            // Запускаем предзагрузку
            startPreload();
            
            // Обработчики кликов по кнопкам
            document.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const videoPath = btn.getAttribute('data-video');
                    const finalImagePath = btn.getAttribute('data-final-image');
                    if (videoPath && finalImagePath) {
                        playTransition(videoPath, finalImagePath);
                    }
                });
            });
        });
    })();
</script>
</body>
</html>
