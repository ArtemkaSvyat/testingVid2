<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D навигация по объекту</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="preloader">
    <div class="spinner"></div>
    <div id="load-percent">0%</div>
    <div>Загрузка...</div>
</div>

<div class="viewer">
    <div class="media-container">
        <video id="mainVideo" src="videos/all_flights.mp4" preload="auto" playsinline webkit-playsinline muted></video>
        <!-- Виджет информации -->
    <div id="infoWidget" class="info-widget" style="display: none;">
        <div class="widget-content">
        <button class="close-widget" id="closeInfoBtn">✕</button>
        <h4 id="infoTitle"></h4>
        <p id="infoFlats"></p>
        <p id="infoDeadline"></p>
        </div>
    </div>
    <div id="infoCollapsedBtn" class="info-collapsed" style="display: none;">
    <span>i</span>
    </div>
    <div class="controls" id="controlsPanel">
        <div class="nav-left" id="navLeft"></div>
        <div class="center-buttons" id="centerButtons"></div>
        <div class="nav-right" id="navRight"></div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/video-controls.js"></script>
<script src="js/ui-buttons.js"></script>
<script src="js/ui-update.js"></script>
<script src="js/preloader.js"></script>
<script src="js/main.js"></script>
</body>
</html>
