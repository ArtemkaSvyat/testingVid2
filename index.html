<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D навигация по объекту | Плавные переходы</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .viewer {
            position: relative;
            max-width: 1200px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            background: #000;
        }
        .media-container {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            flex-wrap: wrap;
        }
        .nav-left, .nav-right {
            flex: 0 0 auto;
            min-width: 100px;
            text-align: center;
        }
        .center-buttons {
            flex: 1 1 auto;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        button:hover:not(:disabled) {
            background: #1e2a4a;
            transform: scale(1.02);
        }
        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .home-btn { background: #4a6a8a; }
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: white;
            gap: 16px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #load-percent { font-size: 24px; font-weight: bold; }
        @media (max-width: 700px) {
            .controls { flex-direction: column; align-items: stretch; }
            .nav-left, .nav-right, .center-buttons { justify-content: center; }
        }
    </style>
</head>
<body>
<div id="preloader">
    <div class="spinner"></div>
    <div id="load-percent">0%</div>
    <div>Загрузка видео...</div>
</div>
<div class="viewer">
    <div class="media-container">
        <video id="mainVideo" src="videos/all_flights.mp4" preload="auto" playsinline webkit-playsinline muted></video>
    </div>
    <div class="controls" id="controlsPanel">
        <div class="nav-left" id="navLeft"></div>
        <div class="center-buttons" id="centerButtons"></div>
        <div class="nav-right" id="navRight"></div>
    </div>
</div>

<script>
(function() {
    const FPS = 30;
    const videoPath = "videos/all_flights.mp4";
    const START_FRAME = 295;

    let currentState = "genplan";
    let selectedQueue = null;
    let isPlaying = false;
    let activeTimeUpdateHandler = null;

    const video = document.getElementById('mainVideo');
    const navLeftDiv = document.getElementById('navLeft');
    const navRightDiv = document.getElementById('navRight');
    const centerDiv = document.getElementById('centerButtons');

    function frameToTime(frame) { return frame / FPS; }

    function disableAllButtons(disabled) {
        document.querySelectorAll('.controls button').forEach(btn => btn.disabled = disabled);
    }

    // Полная остановка текущего воспроизведения и очистка обработчика
    function stopCurrentPlayback() {
        if (activeTimeUpdateHandler) {
            video.removeEventListener('timeupdate', activeTimeUpdateHandler);
            activeTimeUpdateHandler = null;
        }
        if (!video.paused) video.pause();
    }

    // Улучшенный playSegment: плавное воспроизведение от start до end
    // Перед стартом дожидаемся реальной установки позиции и готовности данных
    async function playSegment(startFrame, endFrame, onComplete) {
        if (isPlaying) return;
        stopCurrentPlayback();
        
        const startTime = frameToTime(startFrame);
        const endTime = frameToTime(endFrame);
        
        isPlaying = true;
        disableAllButtons(true);
        
        try {
            // Устанавливаем позицию
            video.currentTime = startTime;
            
            // Ждём, пока видео действительно перейдёт на нужный кадр
            await new Promise((resolve) => {
                if (Math.abs(video.currentTime - startTime) < 0.02 && video.readyState >= 2) {
                    resolve();
                    return;
                }
                const onSeeked = () => {
                    video.removeEventListener('seeked', onSeeked);
                    resolve();
                };
                video.addEventListener('seeked', onSeeked);
                // таймаут на случай, если seeked не сработает
                setTimeout(() => {
                    video.removeEventListener('seeked', onSeeked);
                    resolve();
                }, 500);
            });
            
            // Если данных недостаточно, ждём canplay
            if (video.readyState < 2) {
                await new Promise((resolve) => {
                    const onCanPlay = () => {
                        video.removeEventListener('canplay', onCanPlay);
                        resolve();
                    };
                    video.addEventListener('canplay', onCanPlay);
                    setTimeout(() => {
                        video.removeEventListener('canplay', onCanPlay);
                        resolve();
                    }, 800);
                });
            }
            
            // Запускаем воспроизведение
            await video.play();
            
            // Создаём обработчик для отслеживания окончания
            const onUpdate = () => {
                if (video.currentTime >= endTime) {
                    video.pause();
                    video.removeEventListener('timeupdate', onUpdate);
                    if (activeTimeUpdateHandler === onUpdate) activeTimeUpdateHandler = null;
                    video.currentTime = endTime; // фиксируем точный финальный кадр
                    isPlaying = false;
                    disableAllButtons(false);
                    if (onComplete) onComplete(endFrame);
                    updateUIByFrame(endFrame);
                }
            };
            activeTimeUpdateHandler = onUpdate;
            video.addEventListener('timeupdate', onUpdate);
            
        } catch (err) {
            console.warn("playSegment error:", err);
            isPlaying = false;
            disableAllButtons(false);
            // При ошибке всё равно обновляем UI по текущему кадру
            updateUIByFrame(Math.round(video.currentTime * FPS));
        }
    }

    // Воспроизведение последовательности отрезков (для сложных переходов)
    async function playSegments(segmentsList, finalCallback) {
        if (isPlaying) return;
        stopCurrentPlayback();
        isPlaying = true;
        disableAllButtons(true);
        
        for (const seg of segmentsList) {
            await new Promise((resolve) => {
                playSegment(seg.start, seg.end, () => resolve());
            });
        }
        const lastFrame = segmentsList[segmentsList.length-1].end;
        isPlaying = false;
        disableAllButtons(false);
        if (finalCallback) finalCallback(lastFrame);
        updateUIByFrame(lastFrame);
    }

    // Отрисовка интерфейса
    function clearInterface() {
        navLeftDiv.innerHTML = '';
        navRightDiv.innerHTML = '';
        centerDiv.innerHTML = '';
    }

    function renderNavButtons(currentFrame) {
        const navRules = {
            295:  { left: [896,935], right: [295,344] },
            820:  { left: [896,935], right: [295,344] },
            1225: { left: [896,935], right: [295,344] },
            1540: { left: [896,935], right: [295,344] },
            1875: { left: [896,935], right: [295,344] },
            2128: { left: [896,935], right: [295,344] },
            344:  { left: [1183,1225], right: [465,509] },
            1135: { left: [1183,1225], right: [465,509] },
            509:  { left: [1090,1135], right: [645,690] },
            1035: { left: [1090,1135], right: [645,690] },
            690:  { left: [993,1035], right: [780,820] },
            935:  { left: [993,1035], right: [780,820] }
        };
        const rule = navRules[currentFrame];
        if (rule) {
            if (rule.left) {
                const btn = document.createElement('button');
                btn.textContent = "← Влево";
                btn.onclick = () => { if (!isPlaying) playSegment(rule.left[0], rule.left[1]); };
                navLeftDiv.appendChild(btn);
            }
            if (rule.right) {
                const btn = document.createElement('button');
                btn.textContent = "Вправо →";
                btn.onclick = () => { if (!isPlaying) playSegment(rule.right[0], rule.right[1]); };
                navRightDiv.appendChild(btn);
            }
        }
    }

    function addHomeButton(currentFrame) {
        const genplanQueueFrames = [295, 820, 1225, 1540, 1875, 2128];
        if (genplanQueueFrames.includes(currentFrame)) return;
        
        let segmentsToPlay = null;
        if (currentFrame === 344 || currentFrame === 1135) {
            segmentsToPlay = [{ start: 1183, end: 1225 }];
        } else if (currentFrame === 509 || currentFrame === 1035) {
            segmentsToPlay = [{ start: 645, end: 690 }, { start: 780, end: 820 }];
        } else if (currentFrame === 690 || currentFrame === 935) {
            segmentsToPlay = [{ start: 780, end: 820 }];
        }
        
        const btn = document.createElement('button');
        btn.textContent = "🏠 На главную";
        btn.className = "home-btn";
        if (segmentsToPlay) {
            btn.onclick = () => {
                if (!isPlaying) {
                    playSegments(segmentsToPlay, () => {
                        video.currentTime = frameToTime(START_FRAME);
                        video.pause();
                        updateUIByFrame(START_FRAME);
                    });
                }
            };
        } else {
            btn.onclick = () => {
                if (!isPlaying) {
                    video.currentTime = frameToTime(START_FRAME);
                    video.pause();
                    updateUIByFrame(START_FRAME);
                }
            };
        }
        centerDiv.appendChild(btn);
    }

    function renderGenplanQueueButtons() {
        [1,2,3].forEach(id => {
            const btn = document.createElement('button');
            btn.textContent = `Очередь ${id}`;
            btn.onclick = () => {
                if (isPlaying) return;
                let start, end;
                if (id === 1) { start = 1370; end = 1405; }
                else if (id === 2) { start = 1684; end = 1718; }
                else { start = 1983; end = 2013; }
                playSegment(start, end, () => {
                    selectedQueue = id;
                    currentState = "yard";
                });
            };
            centerDiv.appendChild(btn);
        });
    }

    function renderYardButtons(currentQueue) {
        const others = [];
        if (currentQueue !== 1) others.push(1);
        if (currentQueue !== 2) others.push(2);
        if (currentQueue !== 3) others.push(3);
        others.forEach(target => {
            const btn = document.createElement('button');
            btn.textContent = `→ Очередь ${target}`;
            btn.onclick = () => {
                if (isPlaying) return;
                let start, end;
                if (currentQueue === 1 && target === 2) { start = 2330; end = 2360; }
                else if (currentQueue === 1 && target === 3) { start = 2784; end = 2820; }
                else if (currentQueue === 2 && target === 1) { start = 3018; end = 3060; }
                else if (currentQueue === 2 && target === 3) { start = 2452; end = 2484; }
                else if (currentQueue === 3 && target === 1) { start = 2637; end = 2676; }
                else if (currentQueue === 3 && target === 2) { start = 2900; end = 2942; }
                else return;
                playSegment(start, end, () => { selectedQueue = target; });
            };
            centerDiv.appendChild(btn);
        });
        const backBtn = document.createElement('button');
        backBtn.textContent = "Генплан";
        backBtn.style.background = "#4a6a8a";
        backBtn.onclick = () => {
            if (isPlaying) return;
            let start, end;
            if (selectedQueue === 1) { start = 1507; end = 1540; }
            else if (selectedQueue === 2) { start = 1845; end = 1875; }
            else { start = 2091; end = 2128; }
            playSegment(start, end, () => {
                currentState = "genplan";
                selectedQueue = null;
            });
        };
        centerDiv.appendChild(backBtn);
    }

    function updateUIByFrame(currentFrame) {
        clearInterface();
        console.log("updateUIByFrame, кадр:", currentFrame);
        
        const genplanQueueFrames = [295, 820, 1225, 1540, 1875, 2128];
        const yardMap = {
            1405:1, 2676:1, 3060:1,
            1718:2, 2360:2, 2942:2,
            2013:3, 2484:3, 2820:3
        };
        
        if (yardMap.hasOwnProperty(currentFrame)) {
            currentState = "yard";
            selectedQueue = yardMap[currentFrame];
        } else {
            currentState = "genplan";
            selectedQueue = null;
        }
        
        renderNavButtons(currentFrame);
        
        if (currentState === "genplan") {
            if (genplanQueueFrames.includes(currentFrame)) {
                renderGenplanQueueButtons();
            }
            if (!genplanQueueFrames.includes(currentFrame) && currentFrame !== START_FRAME) {
                addHomeButton(currentFrame);
            }
        } else if (currentState === "yard") {
            renderYardButtons(selectedQueue);
        }
    }

    // Загрузка и старт
    const preloader = document.getElementById('preloader');
    const loadPercent = document.getElementById('load-percent');
    
    function startApp() {
        let lastPercent = 0;
        const interval = setInterval(() => {
            if (video.buffered.length > 0) {
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                const percent = Math.min(100, Math.round((bufferedEnd / video.duration) * 100));
                if (percent !== lastPercent) {
                    lastPercent = percent;
                    loadPercent.textContent = percent + '%';
                }
                if (percent >= 100) {
                    clearInterval(interval);
                    preloader.style.display = 'none';
                    video.currentTime = frameToTime(START_FRAME);
                    video.pause();
                    setTimeout(() => updateUIByFrame(START_FRAME), 50);
                }
            } else {
                loadPercent.textContent = '0%';
            }
        }, 200);
        setTimeout(() => {
            if (preloader.style.display !== 'none') {
                preloader.style.display = 'none';
                video.currentTime = frameToTime(START_FRAME);
                video.pause();
                updateUIByFrame(START_FRAME);
            }
        }, 15000);
    }
    
    video.src = videoPath;
    video.load();
    video.addEventListener('loadeddata', startApp);
    video.addEventListener('error', () => {
        preloader.style.display = 'none';
        alert('Ошибка загрузки видео. Проверьте путь: ' + videoPath);
    });
})();
</script>
</body>
</html>
