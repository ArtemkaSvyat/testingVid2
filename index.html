<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D облёт здания — одно видео, всё на паузе</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .viewer {
            position: relative;
            max-width: 1200px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            background: #000;
        }
        .media-container {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        button:hover {
            background: #1e2a4a;
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Прелоадер */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: white;
            gap: 16px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #load-percent {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="preloader">
    <div class="spinner"></div>
    <div id="load-percent">0%</div>
    <div>Загрузка видео...</div>
</div>

<div class="viewer">
    <div class="media-container">
        <!-- Единственное видео, которое будет и показывать виды, и проигрывать перелёты -->
        <video id="mainVideo" src="videos/all_flights.mp4" preload="auto" playsinline webkit-playsinline muted></video>
    </div>
    <div id="controlsContainer" class="controls">
        <!-- Кнопки будут добавлены скриптом -->
    </div>
</div>

<script>
    (function() {
        // ======================= НАСТРОЙКИ (ИЗМЕНИ ПОД СЕБЯ) =======================
        const FPS = 30;                           // Частота кадров видео
        const videoPath = "videos/all_flights.mp4"; // Путь к одному длинному видео
        
        // Начальный кадр, на котором будет стоять видео после загрузки (первый вид)
        const startFrame = 0;   // или 1, смотря как рендерили
        
        // Описание перелётов (каждый перелёт имеет фиксированные начальный и конечный кадры)
        // После проигрывания видео остановится на конечном кадре, и это станет текущим видом.
        const segments = [
            { startFrame: 0,    endFrame: 87,  buttonText: "Облёт → направо" },
            { startFrame: 87,   endFrame: 150, buttonText: "Облёт → налево" },
            { startFrame: 150,  endFrame: 210, buttonText: "Приблизить фасад" },
            // Добавь свои перелёты по аналогии
            // { startFrame: 210, endFrame: 300, buttonText: "Вид сзади" },
        ];
        // ====================================================================

        const preloader = document.getElementById('preloader');
        const loadPercent = document.getElementById('load-percent');
        const video = document.getElementById('mainVideo');
        const controlsContainer = document.getElementById('controlsContainer');
        
        let currentTimeUpdateHandler = null; // для отслеживания окончания отрезка
        
        // Преобразование кадра в секунды
        function frameToTime(frame) {
            return frame / FPS;
        }
        
        // Остановить текущее воспроизведение и убрать обработчик
        function stopCurrentPlayback() {
            if (currentTimeUpdateHandler) {
                video.removeEventListener('timeupdate', currentTimeUpdateHandler);
                currentTimeUpdateHandler = null;
            }
            video.pause();
        }
        
        // Воспроизвести отрезок от startFrame до endFrame
        function playSegment(startFrame, endFrame) {
            // Останавливаем всё, что играло
            stopCurrentPlayback();
            
            const startTime = frameToTime(startFrame);
            const endTime = frameToTime(endFrame);
            
            // Проверка на выход за пределы длительности (можно добавить warning)
            if (endTime > video.duration) {
                console.warn(`Конечный кадр ${endFrame} (${endTime}с) превышает длительность видео ${video.duration}с`);
            }
            
            // Устанавливаем позицию на начало
            video.currentTime = startTime;
            
            // Создаём обработчик для остановки на endTime
            const onTimeUpdate = () => {
                if (video.currentTime >= endTime) {
                    video.pause();
                    video.removeEventListener('timeupdate', onTimeUpdate);
                    currentTimeUpdateHandler = null;
                }
            };
            
            video.addEventListener('timeupdate', onTimeUpdate);
            currentTimeUpdateHandler = onTimeUpdate;
            
            // Запускаем воспроизведение
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(err => {
                    console.warn('Автовоспроизведение заблокировано:', err);
                    // Если не удалось запустить, убираем обработчик и оставляем видео на месте
                    video.removeEventListener('timeupdate', onTimeUpdate);
                    currentTimeUpdateHandler = null;
                });
            }
        }
        
        // Создание кнопок на основе массива segments
        function renderButtons() {
            controlsContainer.innerHTML = '';
            segments.forEach(seg => {
                const btn = document.createElement('button');
                btn.textContent = seg.buttonText;
                btn.addEventListener('click', () => {
                    playSegment(seg.startFrame, seg.endFrame);
                });
                controlsContainer.appendChild(btn);
            });
        }
        
        // Предзагрузка видео: дожидаемся, пока можно будет перематывать
        function waitForVideoReady() {
            return new Promise((resolve) => {
                if (video.readyState >= 2) { // HAVE_CURRENT_DATA
                    resolve();
                    return;
                }
                const onLoadedData = () => {
                    video.removeEventListener('loadeddata', onLoadedData);
                    resolve();
                };
                video.addEventListener('loadeddata', onLoadedData);
                video.load();
            });
        }
        
        // Отображение прогресса загрузки через buffered
        function startPreloaderAndPlay() {
            let lastPercent = 0;
            const interval = setInterval(() => {
                if (video.buffered.length > 0) {
                    const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                    const percent = Math.min(100, Math.round((bufferedEnd / video.duration) * 100));
                    if (percent !== lastPercent) {
                        lastPercent = percent;
                        loadPercent.textContent = percent + '%';
                    }
                    if (percent >= 100) {
                        clearInterval(interval);
                        // Скрываем прелоадер
                        preloader.style.display = 'none';
                        // Устанавливаем видео на начальный кадр и ставим на паузу
                        video.currentTime = frameToTime(startFrame);
                        video.pause();
                        // Создаём кнопки управления
                        renderButtons();
                    }
                } else {
                    loadPercent.textContent = '0%';
                }
            }, 200);
            
            // Защита от бесконечного прелоадера (если видео не грузится, скрыть через 15 секунд)
            setTimeout(() => {
                if (preloader.style.display !== 'none') {
                    console.warn('Таймаут загрузки, принудительный старт');
                    preloader.style.display = 'none';
                    video.currentTime = frameToTime(startFrame);
                    video.pause();
                    renderButtons();
                }
            }, 15000);
        }
        
        // Инициализация
        video.src = videoPath;
        video.load();
        waitForVideoReady().then(() => {
            startPreloaderAndPlay();
        }).catch(() => {
            startPreloaderAndPlay();
        });
    })();
</script>
</body>
</html>
