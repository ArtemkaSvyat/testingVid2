<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D навигация по объекту</title>
    <style> 
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .viewer {
            position: relative;
            max-width: 1200px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            background: #000;
        }
        .media-container {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Единая панель управления */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            flex-wrap: wrap;
        }
        .nav-left, .nav-right {
            flex: 0 0 auto;
            min-width: 100px;
            text-align: center;
        }
        .center-buttons {
            flex: 1 1 auto;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        button:hover:not(:disabled) {
            background: #1e2a4a;
            transform: scale(1.02);
        }
        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .home-btn {
            background: #4a6a8a;
        }
        /* Прелоадер */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: white;
            gap: 16px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #load-percent {
            font-size: 24px;
            font-weight: bold;
        }
        @media (max-width: 700px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-left, .nav-right, .center-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div id="preloader">
    <div class="spinner"></div>
    <div id="load-percent">0%</div>
    <div>Загрузка видео...</div>
</div>

<div class="viewer">
    <div class="media-container">
        <video id="mainVideo" src="videos/all_flights.mp4" preload="auto" playsinline webkit-playsinline muted></video>
    </div>
    
    <div class="controls" id="controlsPanel">
        <div class="nav-left" id="navLeft"></div>
        <div class="center-buttons" id="centerButtons"></div>
        <div class="nav-right" id="navRight"></div>
    </div>
</div>

<script>
    (function() {
        // ======================= КОНФИГУРАЦИЯ =======================
        const FPS = 30;
        const videoPath = "videos/all_flights.mp4"; // Укажите свой путь
        const START_FRAME = 295;
        
        let currentState = "genplan";   // "genplan" или "yard"
        let selectedQueue = null;       // 1,2,3
        let isPlaying = false;
        
        const video = document.getElementById('mainVideo');
        const navLeftDiv = document.getElementById('navLeft');
        const navRightDiv = document.getElementById('navRight');
        const centerDiv = document.getElementById('centerButtons');
        
        // Вспомогательные функции
        function frameToTime(frame) { return frame / FPS; }
        
        function disableAllButtons(disabled) {
            const btns = document.querySelectorAll('.controls button');
            btns.forEach(btn => btn.disabled = disabled);
        }
        
        // Воспроизведение отрезка
        function playSegment(startFrame, endFrame, onCompleteCallback) {
            if (isPlaying) return;
            isPlaying = true;
            disableAllButtons(true);
            
            const startTime = frameToTime(startFrame);
            const endTime = frameToTime(endFrame);
            video.currentTime = startTime;
            
            const onTimeUpdate = () => {
                if (video.currentTime >= endTime) {
                    video.pause();
                    video.removeEventListener('timeupdate', onTimeUpdate);
                    isPlaying = false;
                    disableAllButtons(false);
                    if (onCompleteCallback) onCompleteCallback(endFrame);
                    updateUIByFrame(endFrame);
                }
            };
            video.addEventListener('timeupdate', onTimeUpdate);
            video.play().catch(err => {
                console.warn('Автовоспроизведение заблокировано:', err);
                video.removeEventListener('timeupdate', onTimeUpdate);
                isPlaying = false;
                disableAllButtons(false);
            });
        }
        
        // ======================= ОТРИСОВКА ИНТЕРФЕЙСА =======================
        function clearInterface() {
            navLeftDiv.innerHTML = '';
            navRightDiv.innerHTML = '';
            centerDiv.innerHTML = '';
        }
        
        // Отобразить кнопки навигации (влево/вправо) если доступны
        function renderNavButtons(currentFrame) {
            const navMap = {
                295: { right: [295,344], left: [896,935] },
                344: { right: [465,509], left: [1183,1225] },
                465: { right: [645,690], left: [1090,1135] },
                690: { right: [780,820], left: [993,1035] }
            };
            const nav = navMap[currentFrame];
            if (nav) {
                if (nav.left) {
                    const leftBtn = document.createElement('button');
                    leftBtn.textContent = "← Влево";
                    leftBtn.addEventListener('click', () => {
                        if (!isPlaying) playSegment(nav.left[0], nav.left[1], null);
                    });
                    navLeftDiv.appendChild(leftBtn);
                }
                if (nav.right) {
                    const rightBtn = document.createElement('button');
                    rightBtn.textContent = "Вправо →";
                    rightBtn.addEventListener('click', () => {
                        if (!isPlaying) playSegment(nav.right[0], nav.right[1], null);
                    });
                    navRightDiv.appendChild(rightBtn);
                }
            }
        }
        
        // Кнопка "На главную" (возврат на 295)
        function renderHomeButton() {
            const homeBtn = document.createElement('button');
            homeBtn.textContent = "🏠 На главную";
            homeBtn.className = "home-btn";
            homeBtn.addEventListener('click', () => {
                if (!isPlaying) {
                    playSegment(START_FRAME, START_FRAME, (finalFrame) => {
                        // Просто перемотка без анимации
                        video.currentTime = frameToTime(START_FRAME);
                        video.pause();
                        updateUIByFrame(START_FRAME);
                    });
                }
            });
            // Помещаем в центр
            centerDiv.appendChild(homeBtn);
        }
        
        // Режим генплана: кнопки очередей в центре
        function renderGenplanQueueButtons() {
            const queues = [
                { id: 1, text: "Очередь 1" },
                { id: 2, text: "Очередь 2" },
                { id: 3, text: "Очередь 3" }
            ];
            queues.forEach(q => {
                const btn = document.createElement('button');
                btn.textContent = q.text;
                btn.addEventListener('click', () => {
                    if (isPlaying) return;
                    let startFrame, endFrame;
                    if (q.id === 1) { startFrame = 1370; endFrame = 1405; }
                    else if (q.id === 2) { startFrame = 1684; endFrame = 1718; }
                    else { startFrame = 1983; endFrame = 2013; }
                    playSegment(startFrame, endFrame, (finalFrame) => {
                        selectedQueue = q.id;
                        currentState = "yard";
                    });
                });
                centerDiv.appendChild(btn);
            });
        }
        
        // Режим двора: кнопки перехода между очередями и кнопка "Генплан" в центре
        function renderYardButtons(currentQueue) {
            // Кнопки перехода к другим очередям
            const otherQueues = [];
            if (currentQueue !== 1) otherQueues.push({ id: 1, text: "Очередь 1" });
            if (currentQueue !== 2) otherQueues.push({ id: 2, text: "Очередь 2" });
            if (currentQueue !== 3) otherQueues.push({ id: 3, text: "Очередь 3" });
            
            otherQueues.forEach(q => {
                const btn = document.createElement('button');
                btn.textContent = `→ Очередь ${q.id}`;
                btn.addEventListener('click', () => {
                    if (isPlaying) return;
                    let startFrame, endFrame;
                    if (currentQueue === 1 && q.id === 2) { startFrame = 2330; endFrame = 2360; }
                    else if (currentQueue === 1 && q.id === 3) { startFrame = 2784; endFrame = 2820; }
                    else if (currentQueue === 2 && q.id === 1) { startFrame = 3018; endFrame = 3060; }
                    else if (currentQueue === 2 && q.id === 3) { startFrame = 2452; endFrame = 2484; }
                    else if (currentQueue === 3 && q.id === 1) { startFrame = 2637; endFrame = 2676; }
                    else if (currentQueue === 3 && q.id === 2) { startFrame = 2900; endFrame = 2942; }
                    else return;
                    playSegment(startFrame, endFrame, (finalFrame) => {
                        selectedQueue = q.id;
                    });
                });
                centerDiv.appendChild(btn);
            });
            
            // Кнопка "Генплан"
            const backBtn = document.createElement('button');
            backBtn.textContent = "Генплан";
            backBtn.style.background = "#4a6a8a";
            backBtn.addEventListener('click', () => {
                if (isPlaying) return;
                let startFrame, endFrame;
                if (selectedQueue === 1) { startFrame = 1507; endFrame = 1540; }
                else if (selectedQueue === 2) { startFrame = 1845; endFrame = 1875; }
                else { startFrame = 2091; endFrame = 2128; }
                playSegment(startFrame, endFrame, (finalFrame) => {
                    currentState = "genplan";
                    selectedQueue = null;
                });
            });
            centerDiv.appendChild(backBtn);
        }
        
        // ======================= ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ПО КАДРУ =======================
        function updateUIByFrame(currentFrame) {
            clearInterface();
            
            // Списки кадров
            const navFrames = [295, 344, 465, 690, 780, 820, 993, 1035, 1090, 1135, 1183, 1225];
            const genplanQueueFrames = [295, 820, 1225, 1540, 1875, 2128];
            const yardFrames = {
                1405: 1, 2676: 1, 3060: 1,
                1718: 2, 2360: 2, 2942: 2,
                2013: 3, 2484: 3, 2820: 3
            };
            
            // Определяем состояние
            if (yardFrames.hasOwnProperty(currentFrame)) {
                currentState = "yard";
                selectedQueue = yardFrames[currentFrame];
            } else if (genplanQueueFrames.includes(currentFrame)) {
                currentState = "genplan";
                selectedQueue = null;
            } else if (navFrames.includes(currentFrame)) {
                currentState = "genplan";
                selectedQueue = null;
            } else {
                // Неизвестный кадр — считаем генпланом без навигации
                currentState = "genplan";
                selectedQueue = null;
            }
            
            // Рендерим кнопки навигации (влево/вправо) только если кадр в navFrames
            if (navFrames.includes(currentFrame)) {
                renderNavButtons(currentFrame);
            }
            
            // Рендерим центральные кнопки
            if (currentState === "genplan") {
                if (genplanQueueFrames.includes(currentFrame)) {
                    renderGenplanQueueButtons();
                } else if (!navFrames.includes(currentFrame)) {
                    // На кадрах, где нет ни навигации, ни очередей, предлагаем вернуться на главную
                    renderHomeButton();
                }
            } else if (currentState === "yard") {
                renderYardButtons(selectedQueue);
            }
            
            // Если навигационных кнопок нет, но кадр не является конечной точкой, возможно нужна кнопка "На главную"
            if (navLeftDiv.children.length === 0 && navRightDiv.children.length === 0 && centerDiv.children.length === 0) {
                renderHomeButton();
            }
        }
        
        // ======================= ЗАГРУЗКА ВИДЕО =======================
        const preloader = document.getElementById('preloader');
        const loadPercent = document.getElementById('load-percent');
        
        function startPreloader() {
            let lastPercent = 0;
            const interval = setInterval(() => {
                if (video.buffered.length > 0) {
                    const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                    const percent = Math.min(100, Math.round((bufferedEnd / video.duration) * 100));
                    if (percent !== lastPercent) {
                        lastPercent = percent;
                        loadPercent.textContent = percent + '%';
                    }
                    if (percent >= 100) {
                        clearInterval(interval);
                        preloader.style.display = 'none';
                        video.currentTime = frameToTime(START_FRAME);
                        video.pause();
                        updateUIByFrame(START_FRAME);
                    }
                } else {
                    loadPercent.textContent = '0%';
                }
            }, 200);
            setTimeout(() => {
                if (preloader.style.display !== 'none') {
                    preloader.style.display = 'none';
                    video.currentTime = frameToTime(START_FRAME);
                    video.pause();
                    updateUIByFrame(START_FRAME);
                }
            }, 15000);
        }
        
        video.src = videoPath;
        video.load();
        video.addEventListener('loadeddata', startPreloader);
        video.addEventListener('error', () => {
            preloader.style.display = 'none';
            alert('Не удалось загрузить видео. Проверьте путь.');
        });
    })();
</script>
</body>
</html>
