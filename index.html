<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D навигация по объекту</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .viewer {
            position: relative;
            max-width: 1200px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            background: #000;
        }
        .media-container {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Единая панель управления */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            flex-wrap: wrap;
        }
        .nav-left, .nav-right {
            flex: 0 0 auto;
            min-width: 100px;
            text-align: center;
        }
        .center-buttons {
            flex: 1 1 auto;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        button:hover:not(:disabled) {
            background: #1e2a4a;
            transform: scale(1.02);
        }
        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .home-btn {
            background: #4a6a8a;
        }
        /* Прелоадер */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: white;
            gap: 16px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #load-percent {
            font-size: 24px;
            font-weight: bold;
        }
        @media (max-width: 700px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-left, .nav-right, .center-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div id="preloader">
    <div class="spinner"></div>
    <div id="load-percent">0%</div>
    <div>Загрузка видео...</div>
</div>

<div class="viewer">
    <div class="media-container">
        <video id="mainVideo" src="videos/all_flights.mp4" preload="auto" playsinline webkit-playsinline muted></video>
    </div>
    
    <div class="controls" id="controlsPanel">
        <div class="nav-left" id="navLeft"></div>
        <div class="center-buttons" id="centerButtons"></div>
        <div class="nav-right" id="navRight"></div>
    </div>
</div>

<script>
    (function() {
        // ======================= КОНФИГУРАЦИЯ =======================
        const FPS = 30;
        const videoPath = "videos/all_flights.mp4"; // Укажите свой путь
        const START_FRAME = 295;
        
        let currentState = "genplan";   // "genplan" или "yard"
        let selectedQueue = null;       // 1,2,3
        let isPlaying = false;
        let pendingSegments = [];        // для последовательного воспроизведения (например, возврат на главную через два отрезка)
        
        const video = document.getElementById('mainVideo');
        const navLeftDiv = document.getElementById('navLeft');
        const navRightDiv = document.getElementById('navRight');
        const centerDiv = document.getElementById('centerButtons');
        
        // Вспомогательные функции
        function frameToTime(frame) { return frame / FPS; }
        
        function disableAllButtons(disabled) {
            const btns = document.querySelectorAll('.controls button');
            btns.forEach(btn => btn.disabled = disabled);
        }
        
        // Воспроизведение одного отрезка
        function playSingleSegment(startFrame, endFrame, onComplete) {
            return new Promise((resolve) => {
                const startTime = frameToTime(startFrame);
                const endTime = frameToTime(endFrame);
                video.currentTime = startTime;
                
                const onTimeUpdate = () => {
                    if (video.currentTime >= endTime) {
                        video.pause();
                        video.removeEventListener('timeupdate', onTimeUpdate);
                        resolve();
                    }
                };
                video.addEventListener('timeupdate', onTimeUpdate);
                video.play().catch(err => {
                    console.warn('Автовоспроизведение заблокировано:', err);
                    video.removeEventListener('timeupdate', onTimeUpdate);
                    resolve(); // всё равно продолжаем
                });
            });
        }
        
        // Воспроизведение одного или нескольких отрезков последовательно
        async function playSegments(segmentsList, finalCallback) {
            if (isPlaying) return;
            isPlaying = true;
            disableAllButtons(true);
            
            for (const seg of segmentsList) {
                await playSingleSegment(seg.start, seg.end);
            }
            // Все отрезки проиграны
            isPlaying = false;
            disableAllButtons(false);
            const finalFrame = segmentsList[segmentsList.length-1].end;
            if (finalCallback) finalCallback(finalFrame);
            updateUIByFrame(finalFrame);
        }
        
        // Упрощённый вызов для одного отрезка
        function playSegment(startFrame, endFrame, onComplete) {
            playSegments([{start: startFrame, end: endFrame}], onComplete);
        }
        
        // ======================= ОТРИСОВКА ИНТЕРФЕЙСА =======================
        function clearInterface() {
            navLeftDiv.innerHTML = '';
            navRightDiv.innerHTML = '';
            centerDiv.innerHTML = '';
        }
        
        // Отобразить кнопки навигации (влево/вправо) на основе текущего кадра
        function renderNavButtons(currentFrame) {
            // Определяем, какие переходы доступны с этого кадра
            // Формат: для каждого кадра определяем { left: [start, end], right: [start, end] }
            const navRules = {
                295:  { left: [896,935], right: [295,344] },
                820:  { left: [896,935], right: [295,344] },
                1225: { left: [896,935], right: [295,344] },
                1540: { left: [896,935], right: [295,344] },
                1875: { left: [896,935], right: [295,344] },
                2128: { left: [896,935], right: [295,344] },
                344:  { left: [1183,1225], right: [465,509] },
                1135: { left: [1183,1225], right: [465,509] },
                509:  { left: [1090,1135], right: [645,690] },
                1035: { left: [1090,1135], right: [645,690] },
                690:  { left: [993,1035], right: [780,820] },
                935:  { left: [993,1035], right: [780,820] }
            };
            
            const rule = navRules[currentFrame];
            if (rule) {
                if (rule.left) {
                    const leftBtn = document.createElement('button');
                    leftBtn.textContent = "← Влево";
                    leftBtn.addEventListener('click', () => {
                        if (!isPlaying) playSegment(rule.left[0], rule.left[1], null);
                    });
                    navLeftDiv.appendChild(leftBtn);
                }
                if (rule.right) {
                    const rightBtn = document.createElement('button');
                    rightBtn.textContent = "Вправо →";
                    rightBtn.addEventListener('click', () => {
                        if (!isPlaying) playSegment(rule.right[0], rule.right[1], null);
                    });
                    navRightDiv.appendChild(rightBtn);
                }
            }
        }
        
        // Кнопка "На главную" (возврат на 295)
        // В зависимости от текущего кадра, выбираем последовательность отрезков
        function addHomeButton() {
            const currentFrame = Math.round(video.currentTime * FPS);
            let segmentsToPlay = [];
            
            if (currentFrame === 344 || currentFrame === 1135) {
                segmentsToPlay = [{start: 1183, end: 1225}];
            } else if (currentFrame === 509 || currentFrame === 1035) {
                segmentsToPlay = [{start: 645, end: 690}, {start: 780, end: 820}];
            } else if (currentFrame === 690 || currentFrame === 935) {
                segmentsToPlay = [{start: 780, end: 820}];
            } else {
                // Для всех остальных случаев просто перемотка на 295 без анимации
                const homeBtn = document.createElement('button');
                homeBtn.textContent = "🏠 На главную";
                homeBtn.className = "home-btn";
                homeBtn.addEventListener('click', () => {
                    if (!isPlaying) {
                        video.currentTime = frameToTime(START_FRAME);
                        video.pause();
                        updateUIByFrame(START_FRAME);
                    }
                });
                centerDiv.appendChild(homeBtn);
                return;
            }
            
            // Если есть отрезки для воспроизведения
            const homeBtn = document.createElement('button');
            homeBtn.textContent = "🏠 На главную";
            homeBtn.className = "home-btn";
            homeBtn.addEventListener('click', () => {
                if (!isPlaying) {
                    playSegments(segmentsToPlay, (finalFrame) => {
                        // После окончания последовательности принудительно ставим на 295
                        video.currentTime = frameToTime(START_FRAME);
                        video.pause();
                        updateUIByFrame(START_FRAME);
                    });
                }
            });
            centerDiv.appendChild(homeBtn);
        }
        
        // Режим генплана: кнопки очередей в центре
        function renderGenplanQueueButtons() {
            const queues = [
                { id: 1, text: "Очередь 1" },
                { id: 2, text: "Очередь 2" },
                { id: 3, text: "Очередь 3" }
            ];
            queues.forEach(q => {
                const btn = document.createElement('button');
                btn.textContent = q.text;
                btn.addEventListener('click', () => {
                    if (isPlaying) return;
                    let startFrame, endFrame;
                    if (q.id === 1) { startFrame = 1370; endFrame = 1405; }
                    else if (q.id === 2) { startFrame = 1684; endFrame = 1718; }
                    else { startFrame = 1983; endFrame = 2013; }
                    playSegment(startFrame, endFrame, (finalFrame) => {
                        selectedQueue = q.id;
                        currentState = "yard";
                    });
                });
                centerDiv.appendChild(btn);
            });
        }
        
        // Режим двора: кнопки перехода между очередями и кнопка "Генплан"
        function renderYardButtons(currentQueue) {
            // Кнопки перехода к другим очередям
            const otherQueues = [];
            if (currentQueue !== 1) otherQueues.push({ id: 1, text: "Очередь 1" });
            if (currentQueue !== 2) otherQueues.push({ id: 2, text: "Очередь 2" });
            if (currentQueue !== 3) otherQueues.push({ id: 3, text: "Очередь 3" });
            
            otherQueues.forEach(q => {
                const btn = document.createElement('button');
                btn.textContent = `→ Очередь ${q.id}`;
                btn.addEventListener('click', () => {
                    if (isPlaying) return;
                    let startFrame, endFrame;
                    if (currentQueue === 1 && q.id === 2) { startFrame = 2330; endFrame = 2360; }
                    else if (currentQueue === 1 && q.id === 3) { startFrame = 2784; endFrame = 2820; }
                    else if (currentQueue === 2 && q.id === 1) { startFrame = 3018; endFrame = 3060; }
                    else if (currentQueue === 2 && q.id === 3) { startFrame = 2452; endFrame = 2484; }
                    else if (currentQueue === 3 && q.id === 1) { startFrame = 2637; endFrame = 2676; }
                    else if (currentQueue === 3 && q.id === 2) { startFrame = 2900; endFrame = 2942; }
                    else return;
                    playSegment(startFrame, endFrame, (finalFrame) => {
                        selectedQueue = q.id;
                    });
                });
                centerDiv.appendChild(btn);
            });
            
            // Кнопка "Генплан"
            const backBtn = document.createElement('button');
            backBtn.textContent = "Генплан";
            backBtn.style.background = "#4a6a8a";
            backBtn.addEventListener('click', () => {
                if (isPlaying) return;
                let startFrame, endFrame;
                if (selectedQueue === 1) { startFrame = 1507; endFrame = 1540; }
                else if (selectedQueue === 2) { startFrame = 1845; endFrame = 1875; }
                else { startFrame = 2091; endFrame = 2128; }
                playSegment(startFrame, endFrame, (finalFrame) => {
                    currentState = "genplan";
                    selectedQueue = null;
                });
            });
            centerDiv.appendChild(backBtn);
        }
        
        // ======================= ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ПО КАДРУ =======================
        function updateUIByFrame(currentFrame) {
            clearInterface();
            
            // Списки кадров для разных режимов
            const genplanQueueFrames = [295, 820, 1225, 1540, 1875, 2128];
            const yardFrames = {
                1405: 1, 2676: 1, 3060: 1,
                1718: 2, 2360: 2, 2942: 2,
                2013: 3, 2484: 3, 2820: 3
            };
            
            // Определяем состояние
            if (yardFrames.hasOwnProperty(currentFrame)) {
                currentState = "yard";
                selectedQueue = yardFrames[currentFrame];
            } else if (genplanQueueFrames.includes(currentFrame)) {
                currentState = "genplan";
                selectedQueue = null;
            } else {
                // Промежуточные кадры (навигационные) — тоже считаем генпланом, но без очередей
                currentState = "genplan";
                selectedQueue = null;
            }
            
            // Всегда рендерим кнопки навигации (влево/вправо), если для этого кадра есть правила
            renderNavButtons(currentFrame);
            
            // Рендерим центральные кнопки
            if (currentState === "genplan") {
                if (genplanQueueFrames.includes(currentFrame)) {
                    renderGenplanQueueButtons();
                } else {
                    // Если нет очередей и нет навигации? Но навигация уже есть. Добавим кнопку "На главную" если нужно
                    // Однако на навигационных кадрах (344,509,690,935,1035,1135) кнопка "На главную" не нужна,
                    // так как там есть влево/вправо. Но если пользователь забрёл куда-то ещё — добавим.
                    const navExists = (navLeftDiv.children.length > 0 || navRightDiv.children.length > 0);
                    if (!navExists) {
                        addHomeButton();
                    }
                }
            } else if (currentState === "yard") {
                renderYardButtons(selectedQueue);
            }
            
            // Если навигационных кнопок нет и центр пуст, показываем "На главную"
            if (navLeftDiv.children.length === 0 && navRightDiv.children.length === 0 && centerDiv.children.length === 0) {
                addHomeButton();
            }
        }
        
        // ======================= ЗАГРУЗКА ВИДЕО =======================
        const preloader = document.getElementById('preloader');
        const loadPercent = document.getElementById('load-percent');
        
        function startPreloader() {
            let lastPercent = 0;
            const interval = setInterval(() => {
                if (video.buffered.length > 0) {
                    const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                    const percent = Math.min(100, Math.round((bufferedEnd / video.duration) * 100));
                    if (percent !== lastPercent) {
                        lastPercent = percent;
                        loadPercent.textContent = percent + '%';
                    }
                    if (percent >= 100) {
                        clearInterval(interval);
                        preloader.style.display = 'none';
                        video.currentTime = frameToTime(START_FRAME);
                        video.pause();
                        updateUIByFrame(START_FRAME);
                    }
                } else {
                    loadPercent.textContent = '0%';
                }
            }, 200);
            setTimeout(() => {
                if (preloader.style.display !== 'none') {
                    preloader.style.display = 'none';
                    video.currentTime = frameToTime(START_FRAME);
                    video.pause();
                    updateUIByFrame(START_FRAME);
                }
            }, 15000);
        }
        
        video.src = videoPath;
        video.load();
        video.addEventListener('loadeddata', startPreloader);
        video.addEventListener('error', () => {
            preloader.style.display = 'none';
            alert('Не удалось загрузить видео. Проверьте путь.');
        });
    })();
</script>
</body>
</html>
