<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D навигация по объекту</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden; /* запрещаем скролл страницы */
        }
        .viewer {
            position: relative;
            max-width: 1200px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            background: #000;
        }
        .media-container {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            touch-action: none; /* отключаем скролл на контейнере */
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none; /* видео не перехватывает события */
        }
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            flex-wrap: wrap;
        }
        .nav-left, .nav-right {
            flex: 0 0 auto;
            min-width: 100px;
            text-align: center;
        }
        .center-buttons {
            flex: 1 1 auto;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            white-space: nowrap;
        }
        button:hover:not(:disabled) {
            background: #1e2a4a;
            transform: scale(1.02);
        }
        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .home-btn {
            background: #4a6a8a;
        }
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: white;
            gap: 16px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #load-percent {
            font-size: 24px;
            font-weight: bold;
        }
        @media (max-width: 700px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-left, .nav-right, .center-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div id="preloader">
    <div class="spinner"></div>
    <div id="load-percent">0%</div>
    <div>Загрузка видео...</div>
</div>

<div class="viewer">
    <div class="media-container" id="mediaContainer">
        <video id="mainVideo" src="videos/all_flights.mp4" preload="auto" playsinline webkit-playsinline muted></video>
    </div>
    <div class="controls" id="controlsPanel">
        <div class="nav-left" id="navLeft"></div>
        <div class="center-buttons" id="centerButtons"></div>
        <div class="nav-right" id="navRight"></div>
    </div>
</div>

<script>
    (function() {
        const FPS = 30;
        const videoPath = "videos/all_flights.mp4";
        const START_FRAME = 270;
        
        let currentState = "genplan";
        let selectedQueue = null;
        let isPlaying = false;
        
        const mediaContainer = document.getElementById('mediaContainer');
        const video = document.getElementById('mainVideo');
        const navLeftDiv = document.getElementById('navLeft');
        const navRightDiv = document.getElementById('navRight');
        const centerDiv = document.getElementById('centerButtons');
        
        const NAV_RULES = {
            270:  { left: [896,935], right: [295,344] },
            820:  { left: [896,935], right: [295,344] },
            1225: { left: [896,935], right: [295,344] },
            1540: { left: [896,935], right: [295,344] },
            1875: { left: [896,935], right: [295,344] },
            2128: { left: [896,935], right: [295,344] },
            344:  { left: [1183,1225], right: [465,509] },
            1135: { left: [1183,1225], right: [465,509] },
            509:  { left: [1090,1135], right: [645,690] },
            1035: { left: [1090,1135], right: [645,690] },
            690:  { left: [993,1035], right: [780,820] },
            935:  { left: [993,1035], right: [780,820] }
        };
        
        function frameToTime(frame) { return frame / FPS; }
        
        function disableAllButtons(disabled) {
            document.querySelectorAll('.controls button').forEach(btn => btn.disabled = disabled);
        }
        
        async function playSegments(segmentsList, finalCallback) {
            if (isPlaying) return;
            isPlaying = true;
            disableAllButtons(true);
            
            for (const seg of segmentsList) {
                await new Promise((resolve) => {
                    const startTime = frameToTime(seg.start);
                    const endTime = frameToTime(seg.end);
                    video.currentTime = startTime;
                    
                    let finished = false;
                    const onUpdate = () => {
                        if (finished) return;
                        if (video.currentTime >= endTime) {
                            finished = true;
                            video.removeEventListener('timeupdate', onUpdate);
                            video.pause();
                            video.currentTime = endTime;
                            resolve();
                        }
                    };
                    video.addEventListener('timeupdate', onUpdate);
                    const timeout = setTimeout(() => {
                        if (!finished) {
                            finished = true;
                            video.removeEventListener('timeupdate', onUpdate);
                            video.pause();
                            video.currentTime = endTime;
                            resolve();
                        }
                    }, (seg.end - seg.start) / FPS * 1000 + 200);
                    
                    video.play().catch(err => {
                        console.warn(err);
                        clearTimeout(timeout);
                        video.removeEventListener('timeupdate', onUpdate);
                        finished = true;
                        resolve();
                    });
                });
            }
            isPlaying = false;
            disableAllButtons(false);
            const finalFrame = segmentsList[segmentsList.length-1].end;
            video.currentTime = frameToTime(finalFrame);
            video.pause();
            if (finalCallback) finalCallback(finalFrame);
            updateUIByFrame(finalFrame);
        }
        
        function playSegment(start, end, onComplete) {
            playSegments([{start, end}], onComplete);
        }
        
        function clearInterface() {
            navLeftDiv.innerHTML = '';
            navRightDiv.innerHTML = '';
            centerDiv.innerHTML = '';
        }
        
        function renderNavButtons(currentFrame) {
            const rule = NAV_RULES[currentFrame];
            if (rule) {
                if (rule.left) {
                    const btn = document.createElement('button');
                    btn.textContent = "← Влево";
                    btn.onclick = () => { if (!isPlaying) playSegment(rule.left[0], rule.left[1]); };
                    navLeftDiv.appendChild(btn);
                }
                if (rule.right) {
                    const btn = document.createElement('button');
                    btn.textContent = "Вправо →";
                    btn.onclick = () => { if (!isPlaying) playSegment(rule.right[0], rule.right[1]); };
                    navRightDiv.appendChild(btn);
                }
            }
        }
        
        function addHomeButton(currentFrame) {
            const genplanQueueFrames = [270, 820, 1225, 1540, 1875, 2128];
            if (genplanQueueFrames.includes(currentFrame)) return;
            
            let segmentsToPlay = null;
            if (currentFrame === 344 || currentFrame === 1135) {
                segmentsToPlay = [{start: 1183, end: 1225}];
            } else if (currentFrame === 509 || currentFrame === 1035) {
                segmentsToPlay = [{start: 645, end: 690}, {start: 780, end: 820}];
            } else if (currentFrame === 690 || currentFrame === 935) {
                segmentsToPlay = [{start: 780, end: 820}];
            }
            
            const btn = document.createElement('button');
            btn.textContent = "🏠 На главную";
            btn.className = "home-btn";
            if (segmentsToPlay) {
                btn.onclick = () => {
                    if (!isPlaying) {
                        playSegments(segmentsToPlay, () => {
                            video.currentTime = frameToTime(START_FRAME);
                            video.pause();
                            updateUIByFrame(START_FRAME);
                        });
                    }
                };
            } else {
                btn.onclick = () => {
                    if (!isPlaying) {
                        video.currentTime = frameToTime(START_FRAME);
                        video.pause();
                        updateUIByFrame(START_FRAME);
                    }
                };
            }
            centerDiv.appendChild(btn);
        }
        
        function renderGenplanQueueButtons() {
            [1,2,3].forEach(id => {
                const btn = document.createElement('button');
                btn.textContent = `Очередь ${id}`;
                btn.onclick = () => {
                    if (isPlaying) return;
                    let start, end;
                    if (id === 1) { start = 1370; end = 1405; }
                    else if (id === 2) { start = 1684; end = 1718; }
                    else { start = 1983; end = 2013; }
                    playSegment(start, end, () => {
                        selectedQueue = id;
                        currentState = "yard";
                    });
                };
                centerDiv.appendChild(btn);
            });
        }
        
        function renderYardButtons(currentQueue) {
            const others = [];
            if (currentQueue !== 1) others.push(1);
            if (currentQueue !== 2) others.push(2);
            if (currentQueue !== 3) others.push(3);
            others.forEach(target => {
                const btn = document.createElement('button');
                btn.textContent = `→ Очередь ${target}`;
                btn.onclick = () => {
                    if (isPlaying) return;
                    let start, end;
                    if (currentQueue === 1 && target === 2) { start = 2330; end = 2360; }
                    else if (currentQueue === 1 && target === 3) { start = 2784; end = 2820; }
                    else if (currentQueue === 2 && target === 1) { start = 3018; end = 3060; }
                    else if (currentQueue === 2 && target === 3) { start = 2452; end = 2484; }
                    else if (currentQueue === 3 && target === 1) { start = 2637; end = 2676; }
                    else if (currentQueue === 3 && target === 2) { start = 2900; end = 2942; }
                    else return;
                    playSegment(start, end, () => { selectedQueue = target; });
                };
                centerDiv.appendChild(btn);
            });
            const backBtn = document.createElement('button');
            backBtn.textContent = "Генплан";
            backBtn.style.background = "#4a6a8a";
            backBtn.onclick = () => {
                if (isPlaying) return;
                let start, end;
                if (selectedQueue === 1) { start = 1507; end = 1540; }
                else if (selectedQueue === 2) { start = 1845; end = 1875; }
                else { start = 2091; end = 2128; }
                playSegment(start, end, () => {
                    currentState = "genplan";
                    selectedQueue = null;
                });
            };
            centerDiv.appendChild(backBtn);
        }
        
        function updateUIByFrame(currentFrame) {
            clearInterface();
            console.log("updateUIByFrame, кадр:", currentFrame);
            
            const genplanQueueFrames = [270, 820, 1225, 1540, 1875, 2128];
            const yardMap = {
                1405:1, 2676:1, 3060:1,
                1718:2, 2360:2, 2942:2,
                2013:3, 2484:3, 2820:3
            };
            
            if (yardMap.hasOwnProperty(currentFrame)) {
                currentState = "yard";
                selectedQueue = yardMap[currentFrame];
            } else {
                currentState = "genplan";
                selectedQueue = null;
            }
            
            renderNavButtons(currentFrame);
            
            if (currentState === "genplan") {
                if (genplanQueueFrames.includes(currentFrame)) {
                    renderGenplanQueueButtons();
                }
                if (!genplanQueueFrames.includes(currentFrame) && currentFrame !== START_FRAME) {
                    addHomeButton(currentFrame);
                }
            } else if (currentState === "yard") {
                renderYardButtons(selectedQueue);
            }
        }
        
        // ========== УПРАВЛЕНИЕ СВАЙПАМИ (ИНВЕРТИРОВАННЫМИ) НА ВСЕЙ СТРАНИЦЕ, НО С ПРОВЕРКОЙ ОБЛАСТИ ==========
        let touchStartX = 0;
        let dragStartX = 0;
        let isDragging = false;
        let isWithinMedia = false; // флаг, что тач начался внутри mediaContainer
        const SWIPE_THRESHOLD = 50;
        
        function getTransitionForDirection(direction) {
            const currentFrame = Math.round(video.currentTime * FPS);
            const rule = NAV_RULES[currentFrame];
            if (rule && rule[direction]) {
                return { start: rule[direction][0], end: rule[direction][1] };
            }
            return null;
        }
        
        function onPointerStart(e) {
            if (isPlaying) return;
            // Проверяем, что цель находится внутри mediaContainer или его потомков
            let target = e.target;
            if (!mediaContainer.contains(target)) return;
            
            isWithinMedia = true;
            e.preventDefault(); // запрещаем скролл
            
            let clientX;
            if (e.touches) {
                clientX = e.touches[0].clientX;
            } else {
                clientX = e.clientX;
            }
            touchStartX = clientX;
            dragStartX = clientX;
            isDragging = true;
        }
        
        function onPointerMove(e) {
            if (!isDragging || isPlaying || !isWithinMedia) return;
            e.preventDefault();
            let currentX, currentY;
            if (e.touches) {
                currentX = e.touches[0].clientX;
                currentY = e.touches[0].clientY;
            } else {
                currentX = e.clientX;
                currentY = e.clientY;
            }
            const deltaX = currentX - dragStartX;
            const deltaY = currentY - touchStartX; // приблизительная вертикаль
            if (Math.abs(deltaX) > SWIPE_THRESHOLD && Math.abs(deltaY) < 100) {
                // ИНВЕРТИРОВАНИЕ: свайп вправо -> вызов left, свайп влево -> вызов right
                if (deltaX > 0) {
                    const transition = getTransitionForDirection('left');
                    if (transition && !isPlaying) {
                        isDragging = false;
                        playSegment(transition.start, transition.end);
                    }
                } else {
                    const transition = getTransitionForDirection('right');
                    if (transition && !isPlaying) {
                        isDragging = false;
                        playSegment(transition.start, transition.end);
                    }
                }
                isDragging = false;
            }
        }
        
        function onPointerEnd(e) {
            isDragging = false;
            isWithinMedia = false;
            e.preventDefault();
        }
        
        // Навешиваем обработчики на body, но с проверкой области
        document.body.addEventListener('touchstart', onPointerStart, { passive: false });
        document.body.addEventListener('touchmove', onPointerMove, { passive: false });
        document.body.addEventListener('touchend', onPointerEnd);
        document.body.addEventListener('mousedown', onPointerStart);
        window.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerEnd);
        // Отключаем скролл колесика на всей странице (опционально)
        window.addEventListener('wheel', (e) => {
            if (mediaContainer.contains(e.target)) e.preventDefault();
        }, { passive: false });
        
        // ========== ЗАГРУЗКА ВИДЕО ==========
        const preloader = document.getElementById('preloader');
        const loadPercent = document.getElementById('load-percent');
        
        function startApp() {
            let lastPercent = 0;
            const interval = setInterval(() => {
                if (video.buffered.length > 0) {
                    const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                    const percent = Math.min(100, Math.round((bufferedEnd / video.duration) * 100));
                    if (percent !== lastPercent) {
                        lastPercent = percent;
                        loadPercent.textContent = percent + '%';
                    }
                    if (percent >= 100) {
                        clearInterval(interval);
                        preloader.style.display = 'none';
                        video.currentTime = frameToTime(START_FRAME);
                        video.pause();
                        setTimeout(() => {
                            updateUIByFrame(START_FRAME);
                        }, 50);
                    }
                } else {
                    loadPercent.textContent = '0%';
                }
            }, 200);
            setTimeout(() => {
                if (preloader.style.display !== 'none') {
                    preloader.style.display = 'none';
                    video.currentTime = frameToTime(START_FRAME);
                    video.pause();
                    updateUIByFrame(START_FRAME);
                }
            }, 15000);
        }
        
        video.src = videoPath;
        video.load();
        video.addEventListener('loadeddata', startApp);
        video.addEventListener('error', () => {
            preloader.style.display = 'none';
            alert('Ошибка загрузки видео. Проверьте путь: ' + videoPath);
        });
    })();
</script>
</body>
</html>
