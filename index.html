<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D навигация по объекту</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .viewer {
            position: relative;
            max-width: 1200px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            background: #000;
        }
        .media-container {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .controls-zone {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            transition: opacity 0.2s;
        }
        .zone-hidden {
            display: none;
        }
        button {
            background: #2c3e66;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        button:hover:not(:disabled) {
            background: #1e2a4a;
            transform: scale(1.02);
        }
        button:active:not(:disabled) {
            transform: scale(0.98);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .info-message {
            color: #aaa;
            font-size: 14px;
            padding: 5px 10px;
        }

        /* Прелоадер */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            color: white;
            gap: 16px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #load-percent {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="preloader">
    <div class="spinner"></div>
    <div id="load-percent">0%</div>
    <div>Загрузка видео...</div>
</div>

<div class="viewer">
    <div class="media-container">
        <video id="mainVideo" src="videos/all_flights.avi" preload="auto" playsinline webkit-playsinline muted></video>
    </div>
    
    <!-- Первая зона: кнопки очередей и кнопка "Генплан" (появляется в режиме двора) -->
    <div id="zone1" class="controls-zone">
        <!-- Кнопки будут добавлены скриптом -->
    </div>
    
    <!-- Вторая зона: кнопки "Вправо" / "Влево" (только в режиме генплана) -->
    <div id="zone2" class="controls-zone zone-hidden">
        <!-- Кнопки будут добавлены скриптом -->
    </div>
</div>

<script>
    (function() {
        // ======================= КОНФИГУРАЦИЯ =======================
        const FPS = 30;                             // Частота кадров видео
        const videoPath = "videos/all_flights.avi";  // Путь к видео (можно .mp4 или .avi, но рекомендуется MP4)
        
        const START_FRAME = 295;                    // Стартовый кадр (генплан)
        
        // Состояния
        let currentState = "genplan";   // "genplan" или "yard"
        let selectedQueue = null;       // 1, 2 или 3 (актуально для yard)
        let isPlaying = false;           // блокировка кнопок во время проигрывания
        
        const video = document.getElementById('mainVideo');
        const zone1Div = document.getElementById('zone1');
        const zone2Div = document.getElementById('zone2');
        
        // Вспомогательная функция: кадр -> секунды
        function frameToTime(frame) {
            return frame / FPS;
        }
        
        // Отключение/включение всех кнопок в обеих зонах
        function disableAllButtons(disabled) {
            const allBtns = document.querySelectorAll('.controls-zone button');
            allBtns.forEach(btn => {
                btn.disabled = disabled;
            });
        }
        
        // Воспроизведение отрезка и вызов callback после остановки
        function playSegment(startFrame, endFrame, onCompleteCallback) {
            if (isPlaying) return;
            isPlaying = true;
            
            disableAllButtons(true);
            
            const startTime = frameToTime(startFrame);
            const endTime = frameToTime(endFrame);
            
            video.currentTime = startTime;
            
            const onTimeUpdate = () => {
                if (video.currentTime >= endTime) {
                    video.pause();
                    video.removeEventListener('timeupdate', onTimeUpdate);
                    isPlaying = false;
                    disableAllButtons(false);
                    if (onCompleteCallback) onCompleteCallback(endFrame);
                    // Обновляем UI в зависимости от конечного кадра
                    updateUIByFrame(endFrame);
                }
            };
            
            video.addEventListener('timeupdate', onTimeUpdate);
            video.play().catch(err => {
                console.warn('Автовоспроизведение заблокировано:', err);
                video.removeEventListener('timeupdate', onTimeUpdate);
                isPlaying = false;
                disableAllButtons(false);
            });
        }
        
        // ======================= РЕНДЕР КНОПОК =======================
        
        // Рендер кнопок первой зоны в режиме генплана (три кнопки очередей)
        function renderGenplanQueueButtons() {
            zone1Div.innerHTML = '';
            const queues = [
                { id: 1, text: "Очередь 1" },
                { id: 2, text: "Очередь 2" },
                { id: 3, text: "Очередь 3" }
            ];
            queues.forEach(q => {
                const btn = document.createElement('button');
                btn.textContent = q.text;
                btn.addEventListener('click', () => {
                    if (isPlaying) return;
                    let startFrame, endFrame;
                    if (q.id === 1) { startFrame = 1370; endFrame = 1405; }
                    else if (q.id === 2) { startFrame = 1684; endFrame = 1718; }
                    else { startFrame = 1983; endFrame = 2013; }
                    
                    playSegment(startFrame, endFrame, (finalFrame) => {
                        selectedQueue = q.id;
                        currentState = "yard";
                    });
                });
                zone1Div.appendChild(btn);
            });
        }
        
        // Рендер кнопок первой зоны в режиме двора (переходы между очередями + кнопка "Генплан")
        function renderYardButtons(currentQueue) {
            zone1Div.innerHTML = '';
            
            const otherQueues = [];
            if (currentQueue !== 1) otherQueues.push({ id: 1, text: "Перейти к очереди 1" });
            if (currentQueue !== 2) otherQueues.push({ id: 2, text: "Перейти к очереди 2" });
            if (currentQueue !== 3) otherQueues.push({ id: 3, text: "Перейти к очереди 3" });
            
            const currentFrame = Math.round(video.currentTime * FPS);
            
            otherQueues.forEach(q => {
                const btn = document.createElement('button');
                btn.textContent = q.text;
                btn.addEventListener('click', () => {
                    if (isPlaying) return;
                    let startFrame, endFrame;
                    // Логика переходов между очередями
                    if (currentQueue === 1 && q.id === 2) { startFrame = 2330; endFrame = 2360; }
                    else if (currentQueue === 1 && q.id === 3) { startFrame = 2784; endFrame = 2820; }
                    else if (currentQueue === 2 && q.id === 1) { startFrame = 3018; endFrame = 3060; }
                    else if (currentQueue === 2 && q.id === 3) { startFrame = 2452; endFrame = 2484; }
                    else if (currentQueue === 3 && q.id === 1) { startFrame = 2637; endFrame = 2676; }
                    else if (currentQueue === 3 && q.id === 2) { startFrame = 2900; endFrame = 2942; }
                    else {
                        console.warn('Переход не определён');
                        return;
                    }
                    playSegment(startFrame, endFrame, (finalFrame) => {
                        selectedQueue = q.id;
                    });
                });
                zone1Div.appendChild(btn);
            });
            
            // Кнопка "Генплан"
            const backBtn = document.createElement('button');
            backBtn.textContent = "Генплан";
            backBtn.style.background = "#4a6a8a";
            backBtn.addEventListener('click', () => {
                if (isPlaying) return;
                let startFrame, endFrame;
                if (selectedQueue === 1) { startFrame = 1507; endFrame = 1540; }
                else if (selectedQueue === 2) { startFrame = 1845; endFrame = 1875; }
                else { startFrame = 2091; endFrame = 2128; }
                
                playSegment(startFrame, endFrame, (finalFrame) => {
                    currentState = "genplan";
                    selectedQueue = null;
                });
            });
            zone1Div.appendChild(backBtn);
        }
        
        // Рендер кнопок второй зоны (вправо/влево) на основе текущего кадра
        function renderNavButtons() {
            const currentFrame = Math.round(video.currentTime * FPS);
            zone2Div.innerHTML = '';
            
            // Описание доступных переходов
            const navMap = {
                295: { right: [295,344], left: [896,935] },
                344: { right: [465,509], left: [1183,1225] },
                465: { right: [645,690], left: [1090,1135] },
                690: { right: [780,820], left: [993,1035] }
            };
            
            const nav = navMap[currentFrame];
            if (nav) {
                if (nav.right) {
                    const rightBtn = document.createElement('button');
                    rightBtn.textContent = "Вправо →";
                    rightBtn.addEventListener('click', () => {
                        if (isPlaying) return;
                        playSegment(nav.right[0], nav.right[1], null);
                    });
                    zone2Div.appendChild(rightBtn);
                }
                if (nav.left) {
                    const leftBtn = document.createElement('button');
                    leftBtn.textContent = "← Влево";
                    leftBtn.addEventListener('click', () => {
                        if (isPlaying) return;
                        playSegment(nav.left[0], nav.left[1], null);
                    });
                    zone2Div.appendChild(leftBtn);
                }
            }
            
            if (zone2Div.children.length === 0) {
                const msg = document.createElement('span');
                msg.className = 'info-message';
                msg.textContent = "Нет переходов";
                zone2Div.appendChild(msg);
            }
        }
        
        // ======================= ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ПО КАДРУ =======================
        function updateUIByFrame(currentFrame) {
            // Списки кадров
            const navFrames = [295, 344, 465, 690, 780, 820, 993, 1035, 1090, 1135, 1183, 1225];
            const genplanQueueFrames = [295, 820, 1225, 1540, 1875, 2128];
            const yardToQueue = {
                1405: 1, 2676: 1, 3060: 1,
                1718: 2, 2360: 2, 2942: 2,
                2013: 3, 2484: 3, 2820: 3
            };
            
            // Определяем состояние
            let inYard = false;
            if (yardToQueue.hasOwnProperty(currentFrame)) {
                inYard = true;
                selectedQueue = yardToQueue[currentFrame];
                currentState = "yard";
            } else if (genplanQueueFrames.includes(currentFrame)) {
                inYard = false;
                currentState = "genplan";
                selectedQueue = null;
            } else if (navFrames.includes(currentFrame)) {
                inYard = false;
                currentState = "genplan";
                selectedQueue = null;
            } else {
                inYard = false;
                currentState = "genplan";
                selectedQueue = null;
            }
            
            // Обновляем видимость зон
            if (currentState === "genplan") {
                // Зона2 видна только на кадрах из navFrames
                if (navFrames.includes(currentFrame)) {
                    zone2Div.classList.remove('zone-hidden');
                    renderNavButtons();  // отрисовываем кнопки навигации
                } else {
                    zone2Div.classList.add('zone-hidden');
                }
                
                // Зона1 видна только на кадрах из genplanQueueFrames
                if (genplanQueueFrames.includes(currentFrame)) {
                    zone1Div.classList.remove('zone-hidden');
                    renderGenplanQueueButtons();
                } else {
                    zone1Div.classList.add('zone-hidden');
                }
            } else if (currentState === "yard") {
                zone2Div.classList.add('zone-hidden');
                zone1Div.classList.remove('zone-hidden');
                renderYardButtons(selectedQueue);
            }
        }
        
        // ======================= ЗАГРУЗКА ВИДЕО И СТАРТ =======================
        const preloader = document.getElementById('preloader');
        const loadPercent = document.getElementById('load-percent');
        
        function startPreloaderAndPlay() {
            let lastPercent = 0;
            const interval = setInterval(() => {
                if (video.buffered.length > 0) {
                    const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                    const percent = Math.min(100, Math.round((bufferedEnd / video.duration) * 100));
                    if (percent !== lastPercent) {
                        lastPercent = percent;
                        loadPercent.textContent = percent + '%';
                    }
                    if (percent >= 100) {
                        clearInterval(interval);
                        preloader.style.display = 'none';
                        video.currentTime = frameToTime(START_FRAME);
                        video.pause();
                        updateUIByFrame(START_FRAME);
                    }
                } else {
                    loadPercent.textContent = '0%';
                }
            }, 200);
            
            setTimeout(() => {
                if (preloader.style.display !== 'none') {
                    preloader.style.display = 'none';
                    video.currentTime = frameToTime(START_FRAME);
                    video.pause();
                    updateUIByFrame(START_FRAME);
                }
            }, 15000);
        }
        
        video.src = videoPath;
        video.load();
        video.addEventListener('loadeddata', () => {
            startPreloaderAndPlay();
        });
        video.addEventListener('error', (e) => {
            console.error('Ошибка загрузки видео', e);
            preloader.style.display = 'none';
            alert('Не удалось загрузить видео. Проверьте путь к файлу.');
        });
    })();
</script>
</body>
</html>
